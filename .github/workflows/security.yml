name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  deps-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency vulnerability audit (fail on high+)
        run: npx --yes better-npm-audit audit --level high

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (OWASP Top 10 + SQLi + auth-bypass rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/react
            p/sql-injection
            p/jwt
            p/secrets

  e2e-and-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Build (production)
        run: bun run build

      - name: Start preview
        run: |
          bun run preview --port 8080 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null && break || sleep 1
          done

      - name: Anonymous contact-field leak check
        env:
          BASE_URL: http://localhost:8080
        run: python tests/contact-leak.spec.py

      - name: Admin Global Settings save/persist (optional)
        if: ${{ env.TEST_ADMIN_EMAIL != '' && env.TEST_ADMIN_PASSWORD != '' }}
        env:
          BASE_URL: http://localhost:8080
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: python tests/admin-settings.spec.py
