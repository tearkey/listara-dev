name: Dependency Audit & Smoke Build

on:
  schedule:
    - cron: "0 5 * * *" # daily at 05:00 UTC — catches new advisories for xlsx, js-yaml, etc.
  workflow_dispatch: {}
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "bun.lock"
      - "bun.lockb"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    outputs:
      report: ${{ steps.audit.outputs.report }}
      vulnerable: ${{ steps.audit.outputs.vulnerable }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run npm audit (moderate+, JSON)
        id: audit
        run: |
          set +e
          npx --yes better-npm-audit audit --level moderate --production > audit.txt
          AUDIT_EXIT=$?
          echo "vulnerable=$([[ $AUDIT_EXIT -ne 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<EOF'
            head -c 60000 audit.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"
          cat audit.txt
          # Fail the PR/push run, but let the daily scheduled run continue so
          # the alerting step below can open/refresh the tracking issue.
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            exit $AUDIT_EXIT
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: audit.txt
          retention-days: 30

  alert:
    name: Open/refresh vulnerability tracking issue
    needs: audit
    if: needs.audit.outputs.vulnerable == 'true' && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          REPORT: ${{ needs.audit.outputs.report }}
        with:
          script: |
            const title = "🔐 Dependency vulnerabilities detected";
            const body = [
              "The daily dependency scan flagged one or more moderate/high/critical advisories.",
              "",
              "Run `bun install` locally and inspect the report below, then bump the affected packages (e.g. `bun add <pkg>@latest`) and regenerate `bun.lock` with `bun install --save-text-lockfile`.",
              "",
              "<details><summary>better-npm-audit output</summary>",
              "",
              "```",
              (process.env.REPORT || "(no report captured)").slice(0, 55000),
              "```",
              "",
              "</details>",
            ].join("\n");
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "dependencies,security", per_page: 20,
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: match.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["dependencies", "security"],
              });
            }

  smoke-build:
    name: Smoke: install + typecheck + production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsgo --noEmit

      - name: Production build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
        run: bun run build

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-build-logs
          path: |
            .output/**
            dist/**
          if-no-files-found: ignore
          retention-days: 7